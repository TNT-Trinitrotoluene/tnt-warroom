# =====================================================================
# [정답/모델답안] Task 4 ①: RED/USE 기반 Prometheus 알림 룰
#
# 이 내용을 gitops/monitoring/prometheus-rules.yaml 의
#   data.rules-task4.yml  키 값(현재 "groups: []")에 통째로 붙여넣는다.
# 그 다음:
#   kubectl apply -k gitops/
#   # ConfigMap 투영 반영까지 ~60s 대기 후 리로드 또는 재기동:
#   kubectl -n monitoring rollout restart deploy/prometheus
#   # (또는 포트포워딩 후) curl -X POST localhost:9090/-/reload
#
# 확인: Prometheus UI(:9090) → Status → Rules / Alerts 에서 firing 확인.
# verify.sh 는 rules-task4.yml 에 "alert:" 문자열이 있으면 PASS.
#
# 설계 의도(중요): 임계값을 이번 장애에 과적합시키지 말 것.
# RED(에러율·지연)는 "사용자 체감 SLO" 기준으로, USE(스로틀링)는
# "원인 진단 보조" 기준으로 잡았다. 채널 라우팅은 severity 로 구분한다.
# =====================================================================
groups:
  - name: red-use-checkout
    rules:
      # ── RED: Errors ── 사용자 체감 실패율. SLO(에러율 < 1~5%) 위반 시 P0.
      - alert: CheckoutHighErrorRate
        expr: |
          sum(rate(http_requests_total{app="checkout",path="/checkout",code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{app="checkout",path="/checkout"}[5m]))
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "checkout 5xx 비율 {{ $value | humanizePercentage }} (>5% SLO 위반)"
          description: "결제(checkout) 사용자 요청의 5xx 비율이 SLO 를 초과했습니다."

      # ── RED: Duration ── p99 지연 SLO(1s) 위반.
      - alert: CheckoutHighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{app="checkout",path="/checkout"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "checkout p99 {{ $value }}s (>1s SLO 위반)"
          description: "checkout /checkout p99 지연이 SLO 를 초과했습니다."

      # ── USE: Saturation ── payment 컨테이너 CPU 스로틀링(원인 진단 보조).
      - alert: PaymentCPUThrottling
        expr: |
          sum(rate(container_cpu_cfs_throttled_periods_total{namespace="checkout",container="payment"}[5m]))
          /
          sum(rate(container_cpu_cfs_periods_total{namespace="checkout",container="payment"}[5m]))
          > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "payment CPU 스로틀링 {{ $value | humanizePercentage }} (CPU limit 과소 의심)"
          description: "payment 컨테이너의 CFS 스로틀링 비율이 높습니다. limits.cpu 점검 필요."

      # ── USE: Errors(인프라) ── checkout 네임스페이스 Pod 재시작(OOM 등).
      - alert: CheckoutPodRestarts
        expr: increase(kube_pod_container_status_restarts_total{namespace="checkout"}[10m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "checkout 파드 재시작 반복: {{ $labels.pod }}/{{ $labels.container }}"
          description: "최근 10분 내 재시작 2회 초과. OOMKilled/크래시 여부 확인 필요."
