apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-src
  namespace: checkout
data:
  app.py: |
    import os, time, threading, urllib.request, urllib.error
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    PORT = int(os.environ.get("PORT", "8080"))
    NAME = os.environ.get("APP_NAME", "checkout")
    PAYMENT_URL = os.environ.get("PAYMENT_URL", "http://payment.checkout.svc.cluster.local:8080/pay")
    PAYMENT_TIMEOUT = float(os.environ.get("PAYMENT_TIMEOUT", "1.0"))
    REQ_BUFFER_BYTES = int(os.environ.get("REQ_BUFFER_BYTES", str(1 * 1024 * 1024)))  # 요청 처리 중 점유 메모리
    LEAK_BYTES = int(os.environ.get("LEAK_BYTES", "0"))  # >0 이면 의도적 메모리 누수(기본 off)

    _lock = threading.Lock()
    _counts = {}
    BUCKETS = [0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]
    _hist = {}
    _leak = []

    def _obs(path, code, dur):
        with _lock:
            k = (path, str(code))
            _counts[k] = _counts.get(k, 0) + 1
            h = _hist.get(path)
            if h is None:
                h = {"buckets": [0] * len(BUCKETS), "sum": 0.0, "count": 0}
                _hist[path] = h
            h["sum"] += dur
            h["count"] += 1
            for i, b in enumerate(BUCKETS):
                if dur <= b:
                    h["buckets"][i] += 1

    def _metrics_text():
        out = ["# TYPE http_requests_total counter"]
        with _lock:
            for (path, code), v in _counts.items():
                out.append('http_requests_total{app="%s",path="%s",code="%s"} %d' % (NAME, path, code, v))
            out.append("# TYPE http_request_duration_seconds histogram")
            for path, h in _hist.items():
                cum = 0
                for i, b in enumerate(BUCKETS):
                    cum += h["buckets"][i]
                    out.append('http_request_duration_seconds_bucket{app="%s",path="%s",le="%s"} %d' % (NAME, path, b, cum))
                out.append('http_request_duration_seconds_bucket{app="%s",path="%s",le="+Inf"} %d' % (NAME, path, h["count"]))
                out.append('http_request_duration_seconds_sum{app="%s",path="%s"} %f' % (NAME, path, h["sum"]))
                out.append('http_request_duration_seconds_count{app="%s",path="%s"} %d' % (NAME, path, h["count"]))
        return "\n".join(out) + "\n"

    class H(BaseHTTPRequestHandler):
        protocol_version = "HTTP/1.1"
        def log_message(self, *a):
            pass
        def _send(self, code, body, ctype="application/json"):
            b = body.encode() if isinstance(body, str) else body
            self.send_response(code)
            self.send_header("Content-Type", ctype)
            self.send_header("Content-Length", str(len(b)))
            self.end_headers()
            try:
                self.wfile.write(b)
            except Exception:
                pass
        def do_GET(self):
            path = self.path.split("?", 1)[0]
            if path == "/healthz":
                self._send(200, '{"status":"ok"}'); return
            if path == "/metrics":
                self._send(200, _metrics_text(), "text/plain; version=0.0.4"); return
            if path == "/checkout":
                t0 = time.time()
                buf = bytearray(REQ_BUFFER_BYTES)  # 처리 동안 메모리 점유
                buf[-1] = 1
                if LEAK_BYTES > 0:
                    with _lock:
                        _leak.append(bytearray(LEAK_BYTES))
                code = 200
                try:
                    with urllib.request.urlopen(PAYMENT_URL, timeout=PAYMENT_TIMEOUT) as r:
                        r.read()
                except urllib.error.URLError:
                    code = 504
                except Exception:
                    code = 502
                _obs("/checkout", code, time.time() - t0)
                del buf
                body = '{"status":"ok"}' if code == 200 else '{"error":"payment upstream failed"}'
                self._send(code, body); return
            self._send(404, '{"error":"not found"}')

    if __name__ == "__main__":
        srv = ThreadingHTTPServer(("0.0.0.0", PORT), H)
        print("%s listening on :%d (timeout=%.2fs buf=%dB)" % (NAME, PORT, PAYMENT_TIMEOUT, REQ_BUFFER_BYTES), flush=True)
        srv.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: checkout
  labels:
    app: checkout
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: checkout
          image: python:3.12-slim
          command: ["python", "/app/app.py"]
          env:
            - name: APP_NAME
              value: "checkout"
            - name: PAYMENT_URL
              value: "http://payment.checkout.svc.cluster.local:8080/pay"
            - name: PAYMENT_TIMEOUT
              value: "1.0"
            - name: REQ_BUFFER_BYTES
              value: "1048576"
            - name: LEAK_BYTES
              value: "0"
          ports:
            - containerPort: 8080
          # ⚠️ 결함 후보 영역 — 함부로 정답을 적지 말 것. (해설은 solutions/ 참고)
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: src
              mountPath: /app
      volumes:
        - name: src
          configMap:
            name: checkout-src
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: checkout
  labels:
    app: checkout
spec:
  selector:
    app: checkout
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkout
  namespace: checkout
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70